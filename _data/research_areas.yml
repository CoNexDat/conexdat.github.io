- slug: trafico-de-red
  icon: "fas fa-chart-line"
  title:
    es: "Tráfico de red"
    en: "Network traffic"
    fr: "Trafic réseau"
  excerpt:
    es: "Caracterización estadística *autosimilar* del tráfico residencial. Mediciones continuas de baja carga para evaluar QoS y detectar tráfico de IXPs y CDNs."
    en: "Statistical *self-similar* characterization of residential traffic. Continuous low-load probing for QoS assessment and IXP/CDN traffic detection."
    fr: "Caractérisation statistique *auto-similaire* du trafic résidentiel. Sondages continus à faible charge pour l'évaluation de la QoS et la détection du trafic IXP/CDN."
  body:
    es: |
      Caracterizamos el tráfico de red — y la calidad del servicio que
      este recibe — desde una óptica estadística:

      - **Autosimilitud y dependencias de largo alcance** en el tráfico
        residencial, y su impacto sobre la pérdida de paquetes.
      - **QoS domiciliaria** medida con sondas continuas de muy baja
        carga del canal, integradas a un mapa anotado con QoS y
        túneles MPLS.
      - **Modelos de RTT y latencia** que capturan la influencia
        estocástica del tráfico cruzado, incluso en presencia de
        IXPs y CDNs.
    en: |
      We characterise network traffic — and the quality of service it
      experiences — from a statistical viewpoint:

      - **Self-similarity and long-range dependence** in residential
        traffic, and its impact on packet loss.
      - **Residential-access QoS** measured via continuous, very
        low-load probes, integrated into a map annotated with QoS and
        MPLS tunnels.
      - **RTT and latency models** that capture the stochastic
        influence of cross traffic, even in the presence of IXPs
        and CDNs.
    fr: |
      Nous caractérisons le trafic réseau — et la qualité de service
      qu'il subit — d'un point de vue statistique :

      - **auto-similarité et dépendances à longue portée** dans le
        trafic résidentiel, et leur impact sur la perte de paquets ;
      - **QoS résidentielle** mesurée par sondages continus à très
        faible charge, intégrée à une carte annotée avec QoS et
        tunnels MPLS ;
      - **modèles de RTT et de latence** capturant l'influence
        stochastique du trafic concurrent, même en présence d'IXP
        et de CDN.
  projects:
    - title: "TiX — Traffic information eXchange"
      url: "https://cnet.fi.uba.ar/TiX/"
      blurb:
        es: "Herramienta para medir la calidad del acceso domiciliario a Internet."
        en: "Tool for measuring the quality of residential Internet access."
        fr: "Outil pour mesurer la qualité de l'accès résidentiel à Internet."
    - title: "UBACyT — Mediciones QoS y ruteo"
