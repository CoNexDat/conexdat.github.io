- slug: ciencia-de-datos
  icon: "fas fa-database"
  title:
    es: "Ciencia de Datos"
    en: "Data Science"
    fr: "Science des données"
  excerpt:
    es: "Análisis a gran escala de trazas de Twitter, datos electorales y registros móviles (CDR). Inferimos movilidad humana, demanda de contenidos y dinámica de comunidades online."
    en: "Large-scale analysis of Twitter traces, electoral data, and Call Detail Records (CDR). We infer human mobility, content demand, and online community dynamics."
    fr: "Analyse à grande échelle de traces Twitter, de données électorales et de registres mobiles (CDR). Inférence de la mobilité humaine, de la demande de contenu et de la dynamique des communautés en ligne."
  body:
    es: |
      Combinamos teoría de redes complejas con técnicas de aprendizaje
      automático para extraer estructura y significado de huellas
      digitales masivas:

      - **Redes políticas en Twitter** durante las elecciones argentinas
        de 2015 y 2019 — detectamos la formación dinámica de opiniones a
        partir de la estructura comunitaria de las redes semánticas de
        hashtags.
      - **Movilidad humana** a partir de registros de telefonía móvil
        (CDR) y de redes sociales geolocalizadas; estudio de la
        regularidad y la estratificación socioeconómica.
      - **Sesgo, equidad y valores** en plataformas digitales —
        predicción de atributos demográficos, fundamentos morales y
        actitudes (p. ej. hacia la vacunación) a partir del comportamiento
        online.
    en: |
      We combine complex-network theory with machine-learning techniques
      to extract structure and meaning from massive digital footprints:

      - **Political networks on Twitter** during the 2015 and 2019
        Argentinian elections — we detect the dynamic formation of
        opinion via the community structure of hashtag semantic networks.
      - **Human mobility** from Call Detail Records (CDR) and
        geolocated social-media data; regularity and socio-economic
        stratification.
      - **Bias, fairness and values** in digital platforms — predicting
        demographics, moral foundations, and attitudes (e.g. towards
        vaccination) from online behaviour.
    fr: |
      Nous combinons la théorie des réseaux complexes avec des
      techniques d'apprentissage automatique pour extraire structure et
      sens des empreintes numériques massives :

      - **réseaux politiques sur Twitter** lors des élections
        argentines de 2015 et 2019 — détection dynamique de l'opinion
        via la structure communautaire des réseaux sémantiques de
        hashtags ;
      - **mobilité humaine** à partir des registres mobiles (CDR) et
        des réseaux sociaux géolocalisés — régularité et
        stratification socio-économique ;
      - **biais, équité et valeurs** sur les plateformes numériques —
        prédiction de données démographiques, fondements moraux et
        attitudes (vaccination, etc.) à partir du comportement en ligne.
  projects:
    - title: "Twitter — Elecciones 2019"
      url: "http://elecciones2019.fi.uba.ar"
      blurb:
        es: "Seguimiento de las elecciones presidenciales argentinas de 2019."
        en: "Tracking the 2019 Argentinian presidential elections."
        fr: "Suivi des élections présidentielles argentines de 2019."
    - title: "OpLaDyn"
      url: "https://cnet.fi.uba.ar/OpLaDyn/"
      blurb:
        es: "Dinámica del paisaje de opinión durante períodos electorales."
        en: "Opinion-landscape dynamics during electoral periods."
        fr: "Dynamique du paysage d'opinion en période électorale."
