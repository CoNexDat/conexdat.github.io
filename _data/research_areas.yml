- slug: sistemas-complejos
  icon: "fas fa-project-diagram"
  title:
    es: "Sistemas Complejos"
    en: "Complex Systems"
    fr: "Systèmes complexes"
  excerpt:
    es: "Estudiamos redes complejas con métodos como descomposición en *k-núcleos* y detección de comunidades. Aplicamos teoría de grafos y modelos de propagación a redes biológicas, sociales y tecnológicas."
    en: "We study complex networks via *k-core* decomposition and community detection. Graph theory and propagation models applied to biological, social and technological networks."
    fr: "Étude des réseaux complexes par décomposition en *k-cœurs* et détection de communautés. Théorie des graphes et modèles de propagation appliqués aux réseaux biologiques, sociaux et technologiques."
  body:
    es: |
      Investigamos la estructura y la dinámica de las **redes complejas**
      desde una perspectiva matemática y experimental. Nuestras
      contribuciones se concentran en tres frentes:

      - **Descomposición en *k-núcleos*** como herramienta para revelar
        jerarquías y para visualizar redes muy grandes — base teórica del
        software [LaNet-vi](http://lanet-vi.fi.uba.ar/).
      - **Detección de comunidades** mediante procesos de crecimiento
        local con función de adecuación dinámica, para superar los
        límites de resolución de la modularidad global.
      - Aplicaciones a **ecosistemas mutualistas** (redes
        plantas–polinizadores) y a otros sistemas físicos como los
        **gases granulares**.
    en: |
      We study the structure and dynamics of **complex networks** from
      both a mathematical and an experimental angle. Our contributions
      cluster around three lines of work:

      - **k-core decomposition** as a tool to reveal hierarchies and to
        visualise very large networks — the theoretical backbone of the
        [LaNet-vi](http://lanet-vi.fi.uba.ar/) software.
      - **Community detection** via local fitness-growth processes, to
        bypass the resolution limits of global modularity.
      - Applications to **mutualistic ecosystems** (plant–pollinator
        networks) and to physical systems such as **granular gases**.
    fr: |
      Nous étudions la structure et la dynamique des **réseaux complexes**
      à la fois sous un angle mathématique et expérimental. Nos
      contributions se concentrent sur trois axes :

      - **décomposition en *k-cœurs*** comme outil pour révéler les
        hiérarchies et visualiser les très grands réseaux — fondement
        théorique du logiciel [LaNet-vi](http://lanet-vi.fi.uba.ar/) ;
      - **détection de communautés** par processus de croissance local
        à fonction de pertinence dynamique, pour dépasser les limites
        de résolution de la modularité globale ;
      - applications aux **écosystèmes mutualistes** (réseaux
        plantes–pollinisateurs) et à des systèmes physiques comme les
        **gaz granulaires**.
  projects:
    - title: "LaNet-vi"
      url: "http://lanet-vi.fi.uba.ar/"
      blurb:
        es: "Software de visualización de redes grandes mediante descomposición en k-núcleos y k-densos."
        en: "Large-network visualization software using k-core and k-dense decomposition."
        fr: "Logiciel de visualisation de grands réseaux par décomposition en k-cœurs et k-denses."
    - title: "SnailVis"
      url: "https://cnet.fi.uba.ar/SnailVis/"
      blurb:
        es: "Paradigma alternativo para visualizar la estructura interna de redes complejas."
        en: "Alternative paradigm for visualising the inner structure of complex networks."
        fr: "Paradigme alternatif pour visualiser la structure interne des réseaux complexes."
