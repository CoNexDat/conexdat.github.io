- slug: redes-ad-hoc
  icon: "fas fa-broadcast-tower"
  title:
    es: "Redes ad-hoc"
    en: "Ad-hoc networks"
    fr: "Réseaux ad-hoc"
  excerpt:
    es: "Protocolos de ruteo para redes inalámbricas sin infraestructura. Desarrollamos *ANTop* (algoritmo bio-inspirado) y lo evaluamos sobre el simulador QUENAS."
    en: "Routing protocols for infrastructure-less wireless networks. We developed *ANTop* (bio-inspired algorithm) and evaluated it on the QUENAS simulator."
    fr: "Protocoles de routage pour réseaux sans-fil sans infrastructure. Nous avons développé *ANTop* (algorithme bio-inspiré) et l'avons évalué sur le simulateur QUENAS."
  body:
    es: |
      Diseñamos y evaluamos protocolos para redes que no disponen de
      infraestructura fija:

      - **ANTop**, algoritmo bio-inspirado de ruteo ad-hoc, simulado
        sobre el entorno **QUENAS**.
      - **Multicast con QoS** — árboles de congestión mínima, soporte
        de QoS y planificación distribuida (M*λ*T y antecesores).
      - Aplicaciones modernas a **RPL en redes inalámbricas** y a
        **rigidez en redes multi-robot** (control basado en
        sub-marcos).
    en: |
      We design and evaluate protocols for infrastructure-less
      networks:

      - **ANTop**, a bio-inspired ad-hoc routing algorithm, simulated
        on the **QUENAS** environment.
      - **QoS-aware multicast** — minimum-congestion trees, QoS
        support, and distributed scheduling (M*λ*T and ancestors).
      - Modern applications to **RPL wireless networks** and to
        **rigidity control in multi-robot networks** (sub-framework
        based control).
    fr: |
      Nous concevons et évaluons des protocoles pour réseaux sans
      infrastructure fixe :

      - **ANTop**, algorithme de routage ad-hoc bio-inspiré, simulé
        sur l'environnement **QUENAS** ;
      - **multicast avec QoS** — arbres de congestion minimale,
        support QoS et ordonnancement distribué (M*λ*T et
        prédécesseurs) ;
      - applications modernes aux **réseaux sans-fil RPL** et au
        **contrôle de rigidité dans les réseaux multi-robots**
        (commande par sous-cadres).
  projects:
    - title: "ANTop / QUENAS"
      url: "https://cnet.fi.uba.ar/PaD/"
      blurb:
        es: "Protocolo bio-inspirado para redes ad-hoc y simulador asociado."
        en: "Bio-inspired protocol for ad-hoc networks and associated simulator."
        fr: "Protocole bio-inspiré pour réseaux ad-hoc et simulateur associé."
  papers:
