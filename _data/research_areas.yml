- slug: internet
  icon: "fas fa-globe"
  title:
    es: "Internet"
    en: "Internet"
    fr: "Internet"
  excerpt:
    es: "Tomografía de Internet y modelado de su topología (BGP, IXPs, AS-level). Diseñamos protocolos de ruteo cuyas tablas crecen sub-linealmente con el tamaño de la red."
    en: "Internet tomography and topology modelling (BGP, IXPs, AS-level). We design routing protocols whose tables grow sub-linearly with network size."
    fr: "Tomographie d'Internet et modélisation de sa topologie (BGP, IXP, niveau AS). Conception de protocoles de routage dont les tables croissent sous-linéairement avec la taille du réseau."
  body:
    es: |
      Estudiamos la estructura de Internet desde tres ángulos
      complementarios:

      - **Tomografía** activa y pasiva — exploración topológica con
        sondas tipo *traceroute*, análisis del sesgo de las mediciones
        y descubrimiento de túneles MPLS ocultos.
      - **Topología a nivel AS** y **BGP** — modelado del grafo de
        sistemas autónomos, descomposición en *k-núcleos* del Internet
        y seguimiento de los proveedores de contenido (CDN) en el
        núcleo de la red.
      - **Internet Exchange Points (IXPs)** en América Latina,
        especialmente en países en vías de desarrollo, donde la
        creación de IXPs cambia drásticamente la calidad de servicio y
        la economía del tráfico.

      También proponemos protocolos de **ruteo EGP** cuyas tablas
      crecen de manera sub-lineal con el tamaño de la red, y
      participamos del IETF (RFC 9198 — *AURA*) para estandarizar
      mediciones unidireccionales.
    en: |
      We study Internet structure from three complementary angles:

      - **Tomography**, both active and passive — topological
        exploration via *traceroute*-like probes, analysis of
        measurement bias, and discovery of hidden MPLS tunnels.
      - **AS-level topology** and **BGP** — modelling the
        autonomous-system graph, *k-core* decomposition of the
        Internet, and tracking the rise of content providers (CDNs)
        in the network core.
      - **Internet Exchange Points (IXPs)** in Latin America, with a
        special focus on developing countries where IXP deployment
        radically changes Quality of Service and traffic economics.

      We also propose **EGP routing** protocols whose tables grow
      sub-linearly with network size, and contribute at the IETF
      (RFC 9198 — *AURA*) on standardising unidirectional
      measurements.
    fr: |
      Nous étudions la structure d'Internet sous trois angles
      complémentaires :

      - **tomographie** active et passive — exploration topologique
        par sondes *traceroute*, analyse du biais de mesure et
        découverte des tunnels MPLS cachés ;
      - **topologie au niveau AS** et **BGP** — modélisation du
        graphe des systèmes autonomes, décomposition en *k-cœurs*
        d'Internet et suivi de la montée des fournisseurs de contenu
        (CDN) au cœur du réseau ;
      - **Internet Exchange Points (IXP)** en Amérique latine, avec
        un focus sur les pays en développement, où le déploiement
        d'un IXP modifie radicalement la qualité de service et
        l'économie du trafic.

      Nous proposons aussi des protocoles de **routage EGP** dont
      les tables croissent sous-linéairement avec la taille du
      réseau, et contribuons à l'IETF (RFC 9198 — *AURA*) sur la
      mesure unidirectionnelle.
  collaborations:
    - name: "Hernán Galperin (USC Annenberg, ex-Universidad de San Andrés)"
      blurb:
        es: "Trabajamos con el Dr. Hernán Galperin, investigador en USC Annenberg (ex-Universidad de San Andrés), en el proyecto de la **Internet Society** que dio lugar a los **primeros IXPs de Bolivia y Paraguay**. La colaboración combina mediciones de red activas con análisis económico y regulatorio del impacto de los IXPs en el acceso a Internet en países en desarrollo."
        en: "We collaborate with Dr. Hernán Galperin, researcher at USC Annenberg (formerly Universidad de San Andrés), on the **Internet Society** project that led to the **first IXPs of Bolivia and Paraguay**. The work combines active network measurement with an economic and regulatory analysis of how IXPs change Internet access in developing countries."
        fr: "Nous collaborons avec le Dr Hernán Galperin, chercheur à USC Annenberg (anciennement Universidad de San Andrés), sur le projet de l'**Internet Society** qui a donné naissance aux **premiers IXP de Bolivie et du Paraguay**. Ce travail combine mesures de réseau actives et analyse économique et réglementaire de l'impact des IXP sur l'accès à Internet dans les pays en développement."
      url: "https://annenberg.usc.edu/faculty/hernan-galperin"
      btn_label:
