# =============================================================================
# CoNexDat — research areas ("Áreas de investigación").
# Drives both the home-page cards and the per-area landing pages at
# /research/<slug>/. Each area carries trilingual content (es / en / fr),
# a list of related sub-projects, optional named collaborations, and a
# curated list of bibtex keys from _bibliography/conexdat.bib.
# =============================================================================

- slug: sistemas-complejos
  icon: "fas fa-project-diagram"
  title:
    es: "Sistemas Complejos"
    en: "Complex Systems"
    fr: "Systèmes complexes"
  excerpt:
    es: "Estudiamos redes complejas con métodos como descomposición en *k-núcleos* y detección de comunidades. Aplicamos teoría de grafos y modelos de propagación a redes biológicas, sociales y tecnológicas."
    en: "We study complex networks via *k-core* decomposition and community detection. Graph theory and propagation models applied to biological, social and technological networks."
    fr: "Étude des réseaux complexes par décomposition en *k-cœurs* et détection de communautés. Théorie des graphes et modèles de propagation appliqués aux réseaux biologiques, sociaux et technologiques."
  axes:
    - icon: "fas fa-layer-group"
      title:
        es: "Descomposición en k-núcleos"
        en: "k-core decomposition"
        fr: "Décomposition en k-cœurs"
      blurb:
        es: "Herramienta para revelar jerarquías y visualizar redes muy grandes — base teórica del software [LaNet-vi](http://lanet-vi.fi.uba.ar/)."
        en: "Reveals hierarchies and scales to very large networks — the theoretical backbone of the [LaNet-vi](http://lanet-vi.fi.uba.ar/) software."
        fr: "Révèle les hiérarchies et passe à l'échelle pour les très grands réseaux — fondement théorique du logiciel [LaNet-vi](http://lanet-vi.fi.uba.ar/)."
    - icon: "fas fa-circle-nodes"
      title:
        es: "Detección de comunidades"
        en: "Community detection"
        fr: "Détection de communautés"
      blurb:
        es: "Procesos de crecimiento local con función de adecuación dinámica, que superan los límites de resolución de la modularidad global."
        en: "Local fitness-growth processes that bypass the resolution limits of global modularity."
        fr: "Processus de croissance local à fonction de pertinence dynamique qui dépassent la limite de résolution de la modularité globale."
    - icon: "fas fa-seedling"
      title:
        es: "Sistemas biológicos y físicos"
        en: "Biological and physical systems"
        fr: "Systèmes biologiques et physiques"
      blurb:
        es: "Ecosistemas mutualistas (plantas–polinizadores) y sistemas físicos como los gases granulares."
        en: "Mutualistic ecosystems (plant–pollinator networks) and physical systems such as granular gases."
        fr: "Écosystèmes mutualistes (plantes–pollinisateurs) et systèmes physiques comme les gaz granulaires."
  projects:
    - title: "LaNet-vi"
      url: "http://lanet-vi.fi.uba.ar/"
      blurb:
        es: "Software de visualización de redes grandes mediante descomposición en k-núcleos y k-densos."
        en: "Large-network visualization software using k-core and k-dense decomposition."
        fr: "Logiciel de visualisation de grands réseaux par décomposition en k-cœurs et k-denses."
    - title: "SnailVis"
      url: "https://cnet.fi.uba.ar/SnailVis/"
      blurb:
        es: "Paradigma alternativo para visualizar la estructura interna de redes complejas."
        en: "Alternative paradigm for visualising the inner structure of complex networks."
        fr: "Paradigme alternatif pour visualiser la structure interne des réseaux complexes."
  # Curated top-5 — bibliography on the area page renders these via
  # {% nocite %} + {% bibliography --cited %}, sorted by year (desc) by
  # the same scholar config that drives /publications/.
  papers:
    - PHCBAH14       # mutualistic ecosystems
    - BBGAH13        # community detection via fitness growth
    - AHBB2011       # edge connectivity through k-core
    - BBAH2010a      # SnailVis paradigm
    - AHP2007        # granular-gas collision network

- slug: ciencia-de-datos
  icon: "fas fa-database"
  title:
    es: "Ciencia de Datos"
    en: "Data Science"
    fr: "Science des données"
  excerpt:
    es: "Análisis a gran escala de trazas de Twitter, datos electorales y registros móviles (CDR). Inferimos movilidad humana, demanda de contenidos y dinámica de comunidades online."
    en: "Large-scale analysis of Twitter traces, electoral data, and Call Detail Records (CDR). We infer human mobility, content demand, and online community dynamics."
    fr: "Analyse à grande échelle de traces Twitter, de données électorales et de registres mobiles (CDR). Inférence de la mobilité humaine, de la demande de contenu et de la dynamique des communautés en ligne."
  axes:
    - icon: "fab fa-twitter"
      title:
        es: "Política en Twitter"
        en: "Politics on Twitter"
        fr: "Politique sur Twitter"
      blurb:
        es: "Redes semánticas de hashtags durante las elecciones argentinas de 2015 y 2019; formación dinámica de opinión a partir de la estructura comunitaria."
        en: "Hashtag semantic networks during the 2015 and 2019 Argentinian elections; dynamic opinion formation from community structure."
        fr: "Réseaux sémantiques de hashtags lors des élections argentines de 2015 et 2019 ; formation dynamique de l'opinion à partir de la structure communautaire."
    - icon: "fas fa-map-marked-alt"
      title:
        es: "Movilidad humana"
        en: "Human mobility"
        fr: "Mobilité humaine"
      blurb:
        es: "Registros de telefonía móvil (CDR) y redes sociales geolocalizadas; regularidad y estratificación socioeconómica."
        en: "Call Detail Records (CDR) and geolocated social-media data; regularity and socio-economic stratification."
        fr: "Registres mobiles (CDR) et réseaux sociaux géolocalisés ; régularité et stratification socio-économique."
    - icon: "fas fa-balance-scale"
      title:
        es: "Sesgo, equidad y valores"
        en: "Bias, fairness, and values"
        fr: "Biais, équité et valeurs"
      blurb:
        es: "Predicción de demografía, fundamentos morales y actitudes (p. ej. hacia la vacunación) a partir del comportamiento en línea."
        en: "Predicting demographics, moral foundations, and attitudes (e.g. towards vaccination) from online behaviour."
        fr: "Prédiction de la démographie, des fondements moraux et des attitudes (vaccination, etc.) à partir du comportement en ligne."
  projects:
    - title: "Twitter — Elecciones 2019"
      url: "http://elecciones2019.fi.uba.ar"
      blurb:
        es: "Seguimiento de las elecciones presidenciales argentinas de 2019."
        en: "Tracking the 2019 Argentinian presidential elections."
        fr: "Suivi des élections présidentielles argentines de 2019."
    - title: "OpLaDyn"
      url: "https://cnet.fi.uba.ar/OpLaDyn/"
      blurb:
        es: "Dinámica del paisaje de opinión durante períodos electorales."
        en: "Opinion-landscape dynamics during electoral periods."
        fr: "Dynamique du paysage d'opinion en période électorale."
  papers:
    - schawe2023understanding   # NYT vs followers — info treatment
    - beiro2022fairness         # fairness in vulnerable-attribute prediction
    - Mussi-Reyero2021          # opinion-landscape dynamics, electoral periods
    - kalimeri2019predicting    # demographics from digital behaviours
    - LFAHSK_2016               # socioeconomic correlations on CDR

- slug: internet
  icon: "fas fa-globe"
  title:
    es: "Internet"
    en: "Internet"
    fr: "Internet"
  excerpt:
    es: "Tomografía de Internet y modelado de su topología (BGP, IXPs, AS-level). Diseñamos protocolos de ruteo cuyas tablas crecen sub-linealmente con el tamaño de la red."
    en: "Internet tomography and topology modelling (BGP, IXPs, AS-level). We design routing protocols whose tables grow sub-linearly with network size."
    fr: "Tomographie d'Internet et modélisation de sa topologie (BGP, IXP, niveau AS). Conception de protocoles de routage dont les tables croissent sous-linéairement avec la taille du réseau."
  axes:
    - icon: "fas fa-route"
      title:
        es: "Tomografía"
        en: "Tomography"
        fr: "Tomographie"
      blurb:
        es: "Sondas tipo *traceroute*, análisis del sesgo de medición y descubrimiento de túneles MPLS ocultos."
        en: "*traceroute*-like probes, analysis of measurement bias, and discovery of hidden MPLS tunnels."
        fr: "Sondes type *traceroute*, analyse du biais de mesure et découverte des tunnels MPLS cachés."
    - icon: "fas fa-sitemap"
      title:
        es: "Topología AS y BGP"
        en: "AS-level topology and BGP"
        fr: "Topologie AS et BGP"
      blurb:
        es: "Modelado del grafo de sistemas autónomos, descomposición en *k-núcleos* del Internet y seguimiento de los CDN en el núcleo de la red."
        en: "Modelling the autonomous-system graph, *k-core* decomposition of the Internet, and tracking CDNs in the network core."
        fr: "Modélisation du graphe des systèmes autonomes, décomposition en *k-cœurs* d'Internet et suivi des CDN au cœur du réseau."
    - icon: "fas fa-globe-americas"
      title:
        es: "IXPs en América Latina"
        en: "Latin American IXPs"
        fr: "IXP en Amérique latine"
      blurb:
        es: "Despliegue de IXPs en países en desarrollo y su impacto sobre la calidad de servicio y la economía del tráfico."
        en: "IXP deployment in developing countries and its impact on Quality of Service and traffic economics."
        fr: "Déploiement d'IXP dans les pays en développement et son impact sur la qualité de service et l'économie du trafic."
    - icon: "fas fa-cogs"
      title:
        es: "Estándares (IETF)"
        en: "Standards (IETF)"
        fr: "Normes (IETF)"
      blurb:
        es: "Contribuciones al IETF — *RFC 9198 (AURA)* para estandarizar mediciones unidireccionales — y propuestas de **ruteo EGP** sub-lineal."
        en: "IETF contributions — *RFC 9198 (AURA)* on standardising unidirectional measurements — and proposals for **sub-linear EGP routing**."
        fr: "Contributions à l'IETF — *RFC 9198 (AURA)* sur la mesure unidirectionnelle — et propositions de **routage EGP** sous-linéaire."
  collaborations:
    - name:
        es: "Primeros IXPs de Bolivia y Paraguay — Internet Society"
        en: "First IXPs of Bolivia and Paraguay — Internet Society"
        fr: "Premiers IXP de Bolivie et du Paraguay — Internet Society"
      blurb:
        es: "Contribuimos al diseño, puesta en marcha y medición de los **primeros Internet Exchange Points (IXPs)** nacionales de **Bolivia** y **Paraguay**, en el marco del programa de la **Internet Society**. El trabajo combina mediciones activas de red con un análisis económico y regulatorio del impacto de los IXPs sobre el acceso a Internet en países en desarrollo. Colaboramos con el [Dr. Hernán Galperin](https://annenberg.usc.edu/faculty/hernan-galperin) (USC Annenberg, ex-Universidad de San Andrés)."
        en: "We contributed to the design, deployment, and measurement of the **first national Internet Exchange Points (IXPs)** of **Bolivia** and **Paraguay**, under the **Internet Society** program. The work combines active network measurement with an economic and regulatory analysis of how IXPs change Internet access in developing countries. In collaboration with [Dr. Hernán Galperin](https://annenberg.usc.edu/faculty/hernan-galperin) (USC Annenberg, formerly Universidad de San Andrés)."
        fr: "Nous avons contribué à la conception, au déploiement et à la mesure des **premiers Internet Exchange Points (IXP)** nationaux de **Bolivie** et du **Paraguay**, dans le cadre du programme de l'**Internet Society**. Ce travail combine des mesures actives de réseau avec une analyse économique et réglementaire de l'impact des IXP sur l'accès à Internet dans les pays en développement. En collaboration avec le [Dr Hernán Galperin](https://annenberg.usc.edu/faculty/hernan-galperin) (USC Annenberg, anciennement Universidad de San Andrés)."
      links:
        - label:
            es: "PIT Paraguay"
            en: "PIT Paraguay"
            fr: "PIT Paraguay"
          url: "https://cnet.fi.uba.ar/PIT/PIT_Paraguay/#"
        - label:
            es: "PIT Bolivia (Agosto 2014)"
            en: "PIT Bolivia (August 2014)"
            fr: "PIT Bolivie (août 2014)"
          url: "https://cnet.fi.uba.ar/PIT/PIT_Bolivia/puertos/Agosto_2014/"
        - label:
            es: "Internet Society"
            en: "Internet Society"
            fr: "Internet Society"
          url: "https://www.internetsociety.org/"
  projects:
    - title: "CDNs en el núcleo de Internet (TMA 2018)"
      url: "https://cnet.fi.uba.ar/TMA2018/"
      blurb:
        es: "Cómo los proveedores de contenido pasaron a estar en el centro de Internet."
        en: "How content providers became central to the AS ecosystem after the rise of private CDNs."
        fr: "Comment les fournisseurs de contenu sont devenus centraux dans l'écosystème des AS après l'essor des CDN privés."
    - title: "I'm Here!"
      url: "http://lanet-vi.fi.uba.ar/i_am_here"
      blurb:
        es: "Visualizá un mapa de la topología de Internet indicando dónde estás."
        en: "Visualise a map of the Internet topology, showing where you are."
        fr: "Visualisez la topologie d'Internet et le point où vous vous trouvez."
    - title: "RFC 9198 — AURA"
      url: "https://www.rfc-editor.org/rfc/rfc9198"
      blurb:
        es: "Advanced Unidirectional Route Assessment — RFC informativo del IETF."
        en: "Advanced Unidirectional Route Assessment — informational IETF RFC."
        fr: "Advanced Unidirectional Route Assessment — RFC informatif de l'IETF."
  papers:
    - CDFDPAH20      # First Look at Latin American IXPs (CCR 2020)
    - CSAHD19        # CDNs in IPv4/IPv6 Internet cores
    - KGAH2018       # Atlas Vision of IPv6 in Latin America
    - CGAH_2015      # IXP performance in Bolivia (with Galperin)
    - AHDBV08        # k-core decomposition of Internet graphs (foundational)

- slug: trafico-de-red
  icon: "fas fa-chart-line"
  title:
    es: "Tráfico de red"
    en: "Network traffic"
    fr: "Trafic réseau"
  excerpt:
    es: "Caracterización estadística *autosimilar* del tráfico residencial. Mediciones continuas de baja carga para evaluar QoS y detectar tráfico de IXPs y CDNs."
    en: "Statistical *self-similar* characterization of residential traffic. Continuous low-load probing for QoS assessment and IXP/CDN traffic detection."
    fr: "Caractérisation statistique *auto-similaire* du trafic résidentiel. Sondages continus à faible charge pour l'évaluation de la QoS et la détection du trafic IXP/CDN."
  axes:
    - icon: "fas fa-wave-square"
      title:
        es: "Autosimilitud y largo alcance"
        en: "Self-similarity and long-range dependence"
        fr: "Auto-similarité et longue portée"
      blurb:
        es: "Tráfico residencial como proceso autosimilar; impacto sobre la pérdida de paquetes."
        en: "Residential traffic as a self-similar process; impact on packet loss."
        fr: "Trafic résidentiel comme processus auto-similaire ; impact sur la perte de paquets."
    - icon: "fas fa-tachometer-alt"
      title:
        es: "QoS domiciliaria"
        en: "Residential-access QoS"
        fr: "QoS résidentielle"
      blurb:
        es: "Sondas continuas de muy baja carga, integradas a un mapa anotado con QoS y túneles MPLS."
        en: "Continuous, very low-load probes integrated into a map annotated with QoS and MPLS tunnels."
        fr: "Sondages continus à très faible charge, intégrés à une carte annotée avec QoS et tunnels MPLS."
    - icon: "fas fa-stopwatch"
      title:
        es: "Modelos de RTT y latencia"
        en: "RTT and latency models"
        fr: "Modèles de RTT et de latence"
      blurb:
        es: "Influencia estocástica del tráfico cruzado, incluso en presencia de IXPs y CDNs."
        en: "Stochastic influence of cross traffic, even in the presence of IXPs and CDNs."
        fr: "Influence stochastique du trafic concurrent, même en présence d'IXP et de CDN."
  projects:
    - title: "TiX — Traffic information eXchange"
      url: "https://cnet.fi.uba.ar/TiX/"
      blurb:
        es: "Herramienta para medir la calidad del acceso domiciliario a Internet."
        en: "Tool for measuring the quality of residential Internet access."
        fr: "Outil pour mesurer la qualité de l'accès résidentiel à Internet."
    - title: "UBACyT — Mediciones QoS y ruteo"
      url: "http://www.uba.ar/secyt/"
      blurb:
        es: "Mediciones de QoS domiciliaria, análisis tomográfico y propuestas de algoritmos de ruteo."
        en: "Residential QoS measurement, tomographic analysis, and routing-algorithm proposals."
        fr: "Mesure de la QoS résidentielle, analyse tomographique et propositions d'algorithmes de routage."
  papers:
    - CGAH17
    - CGAH16
    - AlvFra2004

- slug: redes-ad-hoc
  icon: "fas fa-broadcast-tower"
  title:
    es: "Redes ad-hoc"
    en: "Ad-hoc networks"
    fr: "Réseaux ad-hoc"
  excerpt:
    es: "Protocolos de ruteo para redes inalámbricas sin infraestructura. Desarrollamos *ANTop* (algoritmo bio-inspirado) y lo evaluamos sobre el simulador QUENAS."
    en: "Routing protocols for infrastructure-less wireless networks. We developed *ANTop* (bio-inspired algorithm) and evaluated it on the QUENAS simulator."
    fr: "Protocoles de routage pour réseaux sans-fil sans infrastructure. Nous avons développé *ANTop* (algorithme bio-inspiré) et l'avons évalué sur le simulateur QUENAS."
  axes:
    - icon: "fas fa-bug"
      title:
        es: "ANTop (bio-inspirado)"
        en: "ANTop (bio-inspired)"
        fr: "ANTop (bio-inspiré)"
      blurb:
        es: "Algoritmo de ruteo ad-hoc inspirado en colonias de hormigas, simulado sobre el entorno **QUENAS**."
        en: "Ant-colony-inspired ad-hoc routing algorithm, simulated on the **QUENAS** environment."
        fr: "Algorithme de routage ad-hoc inspiré des colonies de fourmis, simulé sur l'environnement **QUENAS**."
    - icon: "fas fa-broadcast-tower"
      title:
        es: "Multicast con QoS"
        en: "QoS-aware multicast"
        fr: "Multicast avec QoS"
      blurb:
        es: "Árboles de congestión mínima, soporte de QoS y planificación distribuida (M*λ*T y antecesores)."
        en: "Minimum-congestion trees, QoS support, and distributed scheduling (M*λ*T and ancestors)."
        fr: "Arbres de congestion minimale, support QoS et ordonnancement distribué (M*λ*T et prédécesseurs)."
    - icon: "fas fa-robot"
      title:
        es: "Aplicaciones modernas"
        en: "Modern applications"
        fr: "Applications modernes"
      blurb:
        es: "**RPL** en redes inalámbricas y **rigidez en redes multi-robot** mediante control basado en sub-marcos."
        en: "**RPL** wireless networks and **rigidity control in multi-robot networks** via sub-framework based control."
        fr: "**RPL** sans-fil et **contrôle de rigidité multi-robots** par commande à sous-cadres."
  projects:
    - title: "ANTop / QUENAS"
      url: "https://cnet.fi.uba.ar/PaD/"
      blurb:
        es: "Protocolo bio-inspirado para redes ad-hoc y simulador asociado."
        en: "Bio-inspired protocol for ad-hoc networks and associated simulator."
        fr: "Protocole bio-inspiré pour réseaux ad-hoc et simulateur associé."
  papers:
    - PAHMG2022      # subframework-based rigidity in multi-robot networks
    - "9219646"      # multipath in RPL wireless networks (ISCC 2020)
    - AlvFra2003     # MλT — multicast with QoS
    - AlvFra2001     # multicast tree with minimum congestion
    - AlvFra2000     # short survey of multicast protocols
